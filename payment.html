<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zahlung - Lenka Novotná Massage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #F8F4EE;
      --warm-white: #FDFAF6;
      --sand: #E8DDD0;
      --beige: #D4C4B0;
      --terracotta: #A67C5B;
      --terracotta-light: #C49A72;
      --sage: #8A9E8C;
      --sage-dark: #5C7361;
      --charcoal: #2C2820;
      --mid: #6B5F52;
      --light-text: #9A8D80;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Jost', sans-serif;
    }

    body {
      background: var(--warm-white);
      color: var(--charcoal);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .payment-container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 30px rgba(44, 40, 32, 0.08);
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-family: var(--serif);
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: var(--charcoal);
    }

    .subtitle {
      color: var(--light-text);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .booking-info {
      background: var(--cream);
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 25px;
      border-left: 3px solid var(--terracotta);
    }

    .booking-info p {
      margin: 5px 0;
      font-size: 0.9rem;
    }

    .booking-label {
      color: var(--light-text);
      font-weight: 400;
    }

    .booking-value {
      color: var(--charcoal);
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--charcoal);
      font-size: 0.9rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--sand);
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 0.95rem;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(166, 124, 91, 0.1);
    }

    /* Stripe Elements styling */
    .StripeElement {
      padding: 12px;
      border: 1px solid var(--sand);
      border-radius: 4px;
      background: white;
    }

    .StripeElement--focus {
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(166, 124, 91, 0.1);
    }

    .StripeElement--invalid {
      border-color: #dc3545;
    }

    .error-message {
      color: #dc3545;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .price-section {
      border-top: 1px solid var(--sand);
      padding-top: 20px;
      margin-bottom: 25px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .price-total {
      display: flex;
      justify-content: space-between;
      font-weight: 500;
      color: var(--charcoal);
      font-size: 1.1rem;
    }

    .price-amount {
      color: var(--terracotta);
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--terracotta);
      color: white;
      border: none;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      letter-spacing: 0.05em;
    }

    button:hover {
      background: var(--terracotta-light);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      background: var(--beige);
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .button-text {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: var(--terracotta);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: var(--terracotta-light);
    }
  </style>
</head>
<body>
  <div class="payment-container">
    <h1>Bezahlung</h1>
    <p class="subtitle">Bezahle online sicher und einfach</p>

    <div class="success-message" id="successMessage">
      ✓ Zahlung erfolgreich! Danke für deinen Kauf.
    </div>

    <div class="booking-info">
      <div style="display: flex; align-items: center; gap: 16px;">
        <div style="font-size: 2.5rem;" id="productEmoji">🧴</div>
        <div>
          <p style="margin: 0; font-size: 0.85rem; color: var(--light-text); text-transform: uppercase; letter-spacing: 0.05em;">Produkt</p>
          <p style="margin: 0; font-size: 1.2rem; font-weight: 500; color: var(--charcoal);" id="serviceType">Massage</p>
        </div>
      </div>
    </div>

    <form id="paymentForm">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.de" required>
        <div class="error-message" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Dein Name" required>
        <div class="error-message" id="nameError"></div>
      </div>

      <div class="form-group">
        <label>Zahlungsmethode</label>
        <div id="payment-element"></div>
        <div class="error-message" id="paymentError"></div>
      </div>

      <div class="price-section">
        <div class="price-row">
          <span>Servicegebühr:</span>
          <span class="price-amount" id="amountDisplay">€ 0,00</span>
        </div>
        <div class="price-total">
          <span>Gesamtbetrag:</span>
          <span class="price-amount" id="totalDisplay">€ 0,00</span>
        </div>
      </div>

      <button type="submit" id="submitBtn">
        <span class="button-text">
          <span id="buttonText">Jetzt zahlen</span>
        </span>
      </button>
    </form>

    <div class="back-link">
      <a href="index.html">← Zurück zur Website</a>
    </div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    // Stripe initialisieren
    const stripe = Stripe('pk_test_51TEpJv1JU9cOHMMgS0sNaBV69k948uGNyD6y9ouZlq8sDGxz26sgp30KDklAArnAA2Xu7BmfUrLhP5zOnL0xge7D00em17mLSy'); // ← Ersetze mit deinem Public Key
    let paymentElement;
    let clientSecret;
    let elements;

    // Formular-Referenzen
    const form = document.getElementById('paymentForm');
    const submitBtn = document.getElementById('submitBtn');
    const paymentError = document.getElementById('paymentError');
    const emailError = document.getElementById('emailError');
    const nameError = document.getElementById('nameError');
    const successMessage = document.getElementById('successMessage');

    // URL-Parameter auslesen
    const params = new URLSearchParams(window.location.search);
    const amount = parseFloat(params.get('amount')) || 50;
    const serviceCode = params.get('service') || 'massage-termin';

    // Produkt-Mapping
    const products = {
      'aroma-oele': { name: 'Aromatherapie-Öle', emoji: '🧴' },
      'massage-cremes': { name: 'Massage-Cremes', emoji: '🧴' },
      'wellness-sets': { name: 'Wellness-Sets', emoji: '💆' },
      'naturkosmetik': { name: 'Naturkosmetik', emoji: '🌿' },
      'massage-termin': { name: 'Massage-Termin', emoji: '💆' },
      'massage-ganzkorper': { name: 'Ganzkörper-Massage', emoji: '💆' }
    };

    const product = products[serviceCode] || { name: serviceCode, emoji: '💆' };

    // UI mit Daten füllen
    document.getElementById('amountDisplay').textContent = `€ ${amount.toFixed(2)}`;
    document.getElementById('totalDisplay').textContent = `€ ${amount.toFixed(2)}`;
    document.getElementById('serviceType').textContent = product.name;
    document.getElementById('productEmoji').textContent = product.emoji;

    // Payment Intent erstellen und Payment Element initialisieren
    async function initializePayment() {
      try {
        const response = await fetch('https://massage-server-d0t7.onrender.com/create-payment-intent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount,
            currency: 'eur',
            description: `${product.name}`,
            metadata: {
              serviceType: product.name,
              serviceCode
            }
          })
        });

        if (!response.ok) throw new Error('Payment Intent konnte nicht erstellt werden');

        const data = await response.json();
        clientSecret = data.clientSecret;

        // Payment Element erstellen
        elements = stripe.elements({ clientSecret });
        paymentElement = elements.create('payment');
        paymentElement.mount('#payment-element');

      } catch (error) {
        console.error('Error:', error);
        paymentError.textContent = error.message;
        paymentError.classList.add('show');
      }
    }

    // Initialisiere beim Laden
    initializePayment();

    // Form Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const name = document.getElementById('name').value;

      // Validierung
      if (!email || !name) {
        if (!email) emailError.textContent = 'E-Mail erforderlich';
        if (!name) nameError.textContent = 'Name erforderlich';
        return;
      }

      submitBtn.disabled = true;
      document.getElementById('buttonText').innerHTML = '<span class="spinner"></span>Verarbeite...';

      try {
        // Elements.submit() MUSS vorher aufgerufen werden!
        await elements.submit();

        // Zahlung mit Stripe bestätigen
        const result = await stripe.confirmPayment({
          elements,
          clientSecret,
          confirmParams: {
            return_url: `${window.location.origin}/payment.html?success=true`,
            payment_method_data: {
              billing_details: { email, name }
            }
          }
        });

        // Überprüfe Fehler
        if (result.error) {
          paymentError.textContent = result.error.message;
          paymentError.classList.add('show');
          submitBtn.disabled = false;
          document.getElementById('buttonText').textContent = 'Jetzt zahlen';
        }
        // Bei erfolgreicher Zahlung wird der User zur return_url weitergeleitet
      } catch (error) {
        paymentError.textContent = error.message;
        paymentError.classList.add('show');
        submitBtn.disabled = false;
        document.getElementById('buttonText').textContent = 'Jetzt zahlen';
      }
    });

    // Überprüfe wenn von Stripe zurückkehrt (z.B. 3D Secure)
    if (new URLSearchParams(window.location.search).get('success') === 'true') {
      successMessage.classList.add('show');
      form.style.display = 'none';
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 3000);
    }
  </script>
</body>
</html>
